<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruhani Bajaj - Interactive 3D Gallery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui {
            position: fixed;
            color: #fff;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 100;
        }

        .ui-top {
            top: 20px;
            left: 30px;
        }

        .ui-top h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .ui-bottom {
            bottom: 30px;
            left: 30px;
            font-size: 11px;
        }

        .ui-hint {
            position: fixed;
            bottom: 100px;
            left: 30px;
            color: #888;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ui-hint.show {
            opacity: 1;
        }

        /* INFO PANEL */
        .info-panel {
            position: fixed;
            bottom: 50px;
            left: 50px;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #fff;
            padding: 25px;
            max-width: 400px;
            color: #fff;
            max-height: 60vh;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 200;
        }

        .info-panel.show {
            opacity: 1;
            pointer-events: all;
        }

        .info-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        .info-panel p {
            font-size: 12px;
            line-height: 1.8;
            color: #ccc;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .close-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui ui-top">
        <h1>RUHANI BAJAJ</h1>
        <div>INTERACTIVE PORTFOLIO 2025</div>
    </div>

    <div class="ui ui-bottom">
        <div>WASD - MOVE | MOUSE - LOOK | E - INTERACT</div>
    </div>

    <div class="ui-hint" id="hint">Press E to interact</div>

    <div class="info-panel" id="info">
        <button class="close-btn" onclick="closeInfo()">×</button>
        <div id="info-content"></div>
    </div>
