<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruhani Bajaj - Interactive 3D Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            cursor: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ─────── HUD (Heads Up Display) ─────── */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
        }

        .hud-top {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hud-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
        }

        .hud-stats {
            display: flex;
            gap: 2rem;
        }

        .stat {
            display: flex;
            gap: 0.5rem;
        }

        .stat-label {
            color: #00ff00;
        }

        .stat-value {
            color: #ffff00;
        }

        /* ─────── INTERACTION PROMPTS ─────── */
        .interaction-prompt {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            text-align: center;
            animation: blink 1s infinite;
            pointer-events: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .interaction-prompt.hidden {
            display: none;
        }

        /* ─────── MINIMAP ─────── */
        .minimap {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 150px;
            height: 150px;
            border: 2px solid #00ff00;
            background: rgba(0, 255, 0, 0.05);
            pointer-events: none;
            z-index: 200;
        }

        .minimap-player {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ffff00;
        }

        /* ─────── MODAL ─────── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            pointer-events: all;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0a0a0a;
            border: 2px solid #00ff00;
            padding: 3rem;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .modal-content h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #00ff88;
        }

        .modal-content p {
            margin-bottom: 1rem;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #00ff00;
            color: #0a0a0a;
        }

        /* ─────── CURSOR ─────── */
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ff00;
        }

        #cursor-center {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff00;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        /* ─────── LOADING SCREEN ─────── */
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            gap: 2rem;
        }

        #loading.hidden {
            display: none;
        }

        .loading-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: flicker 0.3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-bar {
            width: 300px;
            height: 2px;
            background: rgba(0, 255, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #00ff88);
            width: 0%;
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-top">
            <div class="hud-name">RUHANI.BAJAJ</div>
            <div class="hud-stats">
                <div class="stat">
                    <span class="stat-label">LOCATION:</span>
                    <span class="stat-value" id="location">GALLERY_01</span>
                </div>
                <div class="stat">
                    <span class="stat-label">MODE:</span>
                    <span class="stat-value">INTERACTIVE</span>
                </div>
            </div>
        </div>

        <div class="interaction-prompt" id="prompt">
            PRESS [E] TO INTERACT
        </div>

        <div class="minimap" id="minimap">
            <div class="minimap-player"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- LOADING SCREEN -->
    <div id="loading">
        <div class="loading-text">INITIALIZING PORTFOLIO...</div>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loading-bar"></div>
        </div>
    </div>

    <!-- CURSOR -->
    <div id="custom-cursor">
        <div id="cursor-center"></div>
    </div>

    <script>
        // ════════════════════════════════════════════════════════════
        // THREE.JS SETUP
        // ════════════════════════════════════════════════════════════
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 100, 1000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;

        // ════════════════════════════════════════════════════════════
        // LIGHTING
        // ════════════════════════════════════════════════════════════
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0x00ff88, 1);
        directionalLight.position.set(10, 10, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x00ff00, 1, 50);
        pointLight.position.set(0, 3, 0);
        scene.add(pointLight);

        // ════════════════════════════════════════════════════════════
        // GALLERY ROOMS
        // ════════════════════════════════════════════════════════════
        const gallery = {
            rooms: [],
            exhibits: []
        };

        function createRoom(x, z, width, depth, name, color) {
            const geometry = new THREE.BoxGeometry(width, 5, depth);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.1,
                wireframe: false,
                roughness: 0.7
            });

            const room = new THREE.Mesh(geometry, material);
            room.position.set(x, 2.5, z);
            room.castShadow = true;
            room.receiveShadow = true;
            room.name = name;
            room.userData = { type: 'room', interactive: false };

            scene.add(room);
            gallery.rooms.push(room);

            // Add walls
            const wallMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                emissive: 0x00ff00,
                emissiveIntensity: 0.05,
                roughness: 0.8
            });

            // Front wall
            const frontWall = new THREE.Mesh(new THREE.BoxGeometry(width, 5, 0.2), wallMaterial);
            frontWall.position.set(x, 2.5, z - depth / 2);
            frontWall.castShadow = true;
            frontWall.receiveShadow = true;
            scene.add(frontWall);

            // Back wall
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(width, 5, 0.2), wallMaterial);
            backWall.position.set(x, 2.5, z + depth / 2);
            backWall.castShadow = true;
            backWall.receiveShadow = true;
            scene.add(backWall);

            // Left wall
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, depth), wallMaterial);
            leftWall.position.set(x - width / 2, 2.5, z);
            leftWall.castShadow = true;
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            // Right wall
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, depth), wallMaterial);
            rightWall.position.set(x + width / 2, 2.5, z);
            rightWall.castShadow = true;
            rightWall.receiveShadow = true;
            scene.add(rightWall);
        }

        // Create gallery rooms
        createRoom(0, 0, 20, 20, 'ABOUT_ROOM', 0x0d0221);
        createRoom(30, 0, 20, 20, 'EXPERIENCE_ROOM', 0x1a0033);
        createRoom(-30, 0, 20, 20, 'ESCALATE_ROOM', 0x2d0052);
        createRoom(0, 30, 20, 20, 'WRITING_ROOM', 0x1a0a2e);
        createRoom(0, -30, 20, 20, 'CONTACT_ROOM', 0x0d0a1a);

        // ════════════════════════════════════════════════════════════
        // EXHIBITS (Floating Interactive Objects)
        // ════════════════════════════════════════════════════════════
        const exhibits = [
            {
                position: [0, 2, 0],
                title: 'ABOUT',
                description: 'Brand Strategist & Marketing Professional\n\nMSc Management · University of Birmingham\nFounded Escalate Agency\nExpertise: Brand Strategy, Content Marketing, Paid Social',
                geometry: new THREE.IcosahedronGeometry(1, 4),
                color: 0x00ff88
            },
            {
                position: [30, 2, 0],
                title: 'EXPERIENCE',
                description: 'Brand Ambassador @ Canva 2026-Present\nMarketing & Content Intern @ Silver Fern 2025\nSocial Media Intern @ YouVah 2024\nOperations Intern @ Assam Wood 2024',
                geometry: new THREE.TorusGeometry(1.2, 0.5, 16, 100),
                color: 0x00ffff
            },
            {
                position: [-30, 2, 0],
                title: 'ESCALATE',
                description: 'Social Media Marketing Agency\nFounded 2023 · Sunset 2024\n\nServices: Content Strategy, Paid Ads, Influencer Marketing, Brand Positioning, Analytics',
                geometry: new THREE.OctahedronGeometry(1.2),
                color: 0xff00ff
            },
            {
                position: [0, 2, 30],
                title: 'WRITING',
                description: '01. Why Small Businesses Need Brand Voice\n02. The Instagram Algorithm 2025\n03. What Luxury Brands Get Right\n04. Founding at 21\n05. Gen Z and Traditional Advertising',
                geometry: new THREE.TetrahedronGeometry(1.2),
                color: 0xffaa00
            },
            {
                position: [0, 2, -30],
                title: 'CONTACT',
                description: 'Email: ruhanibajaj1@gmail.com\nPhone: (+44) 07352 685719\nLinkedIn: ruhani-bajajrb\n\nOpen to opportunities & collaborations',
                geometry: new THREE.DodecahedronGeometry(1),
                color: 0x00ff00
            }
        ];

        exhibits.forEach((exhibit, i) => {
            const material = new THREE.MeshStandardMaterial({
                color: exhibit.color,
                emissive: exhibit.color,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2,
                wireframe: false
            });

            const mesh = new THREE.Mesh(exhibit.geometry, material);
            mesh.position.set(...exhibit.position);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = {
                type: 'exhibit',
                interactive: true,
                title: exhibit.title,
                description: exhibit.description
            };

            mesh.rotationSpeed = (Math.random() - 0.5) * 0.01;
            scene.add(mesh);
            gallery.exhibits.push(mesh);
        });

        // ════════════════════════════════════════════════════════════
        // PLAYER MOVEMENT
        // ════════════════════════════════════════════════════════════
        const keys = {};
        const player = { x: 0, z: 5, speed: 0.2, sensitivity: 0.004 };
        let yaw = 0, pitch = 0;

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const deltaX = e.movementX || 0;
            const deltaY = e.movementY || 0;

            yaw -= deltaX * player.sensitivity;
            pitch -= deltaY * player.sensitivity;
            pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
        });

        document.addEventListener('click', () => {
            canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
            canvas.requestPointerLock();
        });

        function updatePlayer() {
            let moveX = 0, moveZ = 0;

            if (keys['w']) moveZ -= player.speed;
            if (keys['s']) moveZ += player.speed;
            if (keys['a']) moveX -= player.speed;
            if (keys['d']) moveX += player.speed;

            const cos = Math.cos(yaw);
            const sin = Math.sin(yaw);

            player.x += moveX * cos - moveZ * sin;
            player.z += moveX * sin + moveZ * cos;

            camera.position.set(player.x, 1.6, player.z);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        // ════════════════════════════════════════════════════════════
        // INTERACTION SYSTEM
        // ══════════���═════════════════════════════════════════════════
        const raycaster = new THREE.Raycaster();
        let hoveredExhibit = null;

        function checkInteractions() {
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            raycaster.set(camera.position, forward);

            const intersects = raycaster.intersectObjects(gallery.exhibits);

            if (intersects.length > 0 && intersects[0].distance < 5) {
                hoveredExhibit = intersects[0].object;
                document.getElementById('prompt').classList.remove('hidden');
            } else {
                hoveredExhibit = null;
                document.getElementById('prompt').classList.add('hidden');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'e' && hoveredExhibit) {
                openModal(hoveredExhibit.userData);
            }
        });

        function openModal(data) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `<h2>${data.title}</h2><p>${data.description.replace(/\n/g, '<br>')}</p>`;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ════════════════════════════════════════════════════════════
        // CURSOR SYSTEM
        // ════════════════════════════════════════════════════════════
        const customCursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';
        });

        // ════════════════════════════════════════════════════════════
        // LOADING
        // ════════════════════════════════════════════════════════════
        window.addEventListener('load', () => {
            const loading = document.getElementById('loading');
            const loadingBar = document.getElementById('loading-bar');
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    loadingBar.style.width = '100%';
                    setTimeout(() => {
                        loading.classList.add('hidden');
                    }, 500);
                }
                loadingBar.style.width = progress + '%';
            }, 200);
        });

        // ════════════════���═══════════════════════════════════════════
        // ANIMATION LOOP
        // ════════════════════════════════════════════════════════════
        function animate() {
            requestAnimationFrame(animate);

            updatePlayer();
            checkInteractions();

            // Rotate exhibits
            gallery.exhibits.forEach((exhibit, i) => {
                exhibit.rotation.x += 0.003;
                exhibit.rotation.y += exhibit.rotationSpeed;
                exhibit.position.y = 2 + Math.sin(Date.now() * 0.001 + i) * 0.5;
            });

            // Update minimap
            const minimapPlayer = document.querySelector('.minimap-player');
            minimapPlayer.style.left = (50 + (player.x / 100) * 50) + '%';
            minimapPlayer.style.top = (50 + (player.z / 100) * 50) + '%';

            // Update HUD
            document.getElementById('location').textContent = hoveredExhibit?.userData.title || 'GALLERY_01';

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
