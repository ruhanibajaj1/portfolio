<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruhani Bajaj - Virtual Gallery Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica', sans-serif;
            cursor: none;
        }

        #viewport {
            width: 100%;
            height: 100%;
        }

        /* UI OVERLAYS */
        .ui-overlay {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }

        .ui-top {
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .ui-title {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        .ui-info {
            display: flex;
            gap: 40px;
            font-size: 11px;
            color: #aaa;
        }

        .ui-bottom {
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            color: #fff;
        }

        .ui-instructions {
            display: flex;
            gap: 30px;
            font-size: 12px;
            color: #aaa;
            letter-spacing: 1px;
        }

        .key {
            color: #fff;
            font-weight: 600;
            margin-right: 5px;
        }

        /* FLOATING TEXT */
        .floating-text {
            position: fixed;
            color: #fff;
            font-size: 14px;
            pointer-events: none;
            text-align: center;
            z-index: 150;
        }

        .floating-text.visible {
            animation: float-in 0.6s ease-out;
        }

        @keyframes float-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ARTWORK CARDS */
        .artwork-card {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #fff;
            padding: 30px;
            max-width: 450px;
            color: #fff;
            pointer-events: all;
            z-index: 200;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .artwork-card.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .artwork-card h3 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 15px;
        }

        .artwork-card p {
            font-size: 13px;
            line-height: 1.8;
            color: #bbb;
            margin-bottom: 12px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            pointer-events: all;
        }

        .close-btn:hover {
            background: #fff;
            color: #000;
        }

        /* LOADING */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            flex-direction: column;
            gap: 30px;
            color: #fff;
        }

        #loading.hidden {
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .loading-text {
            font-size: 14px;
            letter-spacing: 3px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .loading-bar {
            width: 200px;
            height: 1px;
            background: #333;
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            height: 100%;
            background: #fff;
            width: 30%;
            animation: loading-progress 2s infinite;
        }

        @keyframes loading-progress {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        /* CUSTOM CURSOR */
        #cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        #cursor::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid #fff;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="viewport"></div>

    <!-- UI -->
    <div class="ui-overlay ui-top">
        <div class="ui-title">RUHANI BAJAJ</div>
        <div class="ui-info">
            <div>PORTFOLIO 2025</div>
            <div id="room-name">ENTRANCE</div>
        </div>
    </div>

    <div class="ui-overlay ui-bottom">
        <div class="ui-instructions">
            <div><span class="key">WASD</span> to navigate</div>
            <div><span class="key">MOUSE</span> to look</div>
            <div><span class="key">CLICK</span> to interact</div>
        </div>
    </div>

    <div id="artwork-panel" class="artwork-card">
        <button class="close-btn" onclick="closePanel()">×</button>
        <div id="panel-content"></div>
    </div>

    <!-- LOADING -->
    <div id="loading">
        <div class="loading-text">INITIALIZING GALLERY</div>
        <div class="loading-bar"></div>
    </div>

    <!-- CURSOR -->
    <div id="cursor"></div>

    <script>
        // ════════════════════════════════════════════════════════════
        // 3D SCENE SETUP
        // ════════════════════════════════════════════════════════════
        const viewport = document.getElementById('viewport');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.LinearFog(0x000000, 50, 200);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        viewport.appendChild(renderer.domElement);

        // ════════════════════════════════════════════════════════════
        // LIGHTING - MUSEUM STYLE
        // ════════════════════════════════════════════════════════════
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Dramatic spotlights
        const spotlights = [];
        for (let i = 0; i < 6; i++) {
            const spotlight = new THREE.SpotLight(0xffffff, 1.5, 80, Math.PI / 6, 0.8, 2);
            spotlight.position.set(
                Math.cos((i / 6) * Math.PI * 2) * 30,
                20,
                Math.sin((i / 6) * Math.PI * 2) * 30
            );
            spotlight.castShadow = true;
            spotlight.shadow.mapSize.width = 2048;
            spotlight.shadow.mapSize.height = 2048;
            scene.add(spotlight);
            spotlights.push(spotlight);
        }

        // ════════════════════════════════════════════════════════════
        // GALLERY ARCHITECTURE
        // ════════════════════════════════════════════════════════════

        // Main floor
        const floorGeometry = new THREE.PlaneGeometry(200, 200);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.8,
            metalness: 0
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Ceiling
        const ceilingGeometry = new THREE.PlaneGeometry(200, 200);
        const ceilingMaterial = new THREE.MeshStandardMaterial({
            color: 0x0a0a0a,
            roughness: 0.9
        });
        const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
        ceiling.position.y = 15;
        ceiling.rotation.x = Math.PI / 2;
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // Walls
        const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0x0f0f0f,
            roughness: 0.85,
            metalness: 0.05
        });

        function createWall(x, z, width, depth) {
            const geometry = new THREE.BoxGeometry(width, 15, depth);
            const wall = new THREE.Mesh(geometry, wallMaterial);
            wall.position.set(x, 7.5, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            wall.userData = { type: 'wall' };
            scene.add(wall);
            return wall;
        }

        // Create gallery layout - perimeter walls
        createWall(100, 0, 1, 200);   // Right
        createWall(-100, 0, 1, 200);  // Left
        createWall(0, 100, 200, 1);   // Back
        createWall(0, -100, 200, 1);  // Front

        // Interior dividing walls
        createWall(0, 40, 150, 1);
        createWall(0, -40, 150, 1);
        createWall(50, 0, 1, 80);
        createWall(-50, 0, 1, 80);

        // ════════════════════════════════════════════════════════════
        // INTERACTIVE ARTWORKS/EXHIBITS
        // ════════════════════════════════════════════════════════════
        const artworks = [];

        const artworkData = [
            {
                position: [0, 2, -50],
                title: 'ABOUT ME',
                content: `Brand Strategist & Marketing Professional

MSc Management, University of Birmingham
Graduate Route Visa — Open to full-time roles
Founded Escalate, a social media marketing agency

I build brands people remember through data-driven strategy and creative storytelling. I understand how businesses work, not just how they look.`,
                size: 2
            },
            {
                position: [50, 2, -20],
                title: 'EXPERIENCE',
                content: `2026 - Present: Brand Ambassador at Canva
→ Campus activations, product testing, feedback

Jun-Sep 2025: Marketing & Content Intern
Silver Fern Education
→ 10+ SEO blogs, 30+ social posts

Apr-Jun 2024: Social Media Marketing Intern
YouVah
→ Platform strategy, campaign analytics

Jul-Dec 2024: Operations & Finance Intern
Assam Wood & Allied
→ 20% efficiency improvement, sustainability`,
                size: 2
            },
            {
                position: [-50, 2, -20],
                title: 'ESCALATE AGENCY',
                content: `Social Media Marketing Agency
Founded 2023 — Sunset 2024

A boutique agency helping SMEs build authentic brands.

Services:
• Content Strategy & Planning
• Paid Social Advertising
• Influencer Collaborations
• Brand Identity & Positioning
• Campaign Analytics & Reporting
• Client Management

Real-world experience that no classroom could replicate.`,
                size: 2
            },
            {
                position: [50, 2, 20],
                title: 'SKILLS & EXPERTISE',
                content: `Brand Positioning
Campaign Strategy
SEO & Copywriting
Paid Social Advertising
Consumer Psychology
Market Research
Influencer Marketing
Financial Analysis
Excel & Python
Luxury Brand Management

Specializations:
→ Luxury & Premium Brands
→ Gen Z Marketing
→ Consumer Insight
→ Data-Driven Strategy`,
                size: 2
            },
            {
                position: [-50, 2, 20],
                title: 'WRITING & INSIGHTS',
                content: `Blog Posts Coming Soon:

01. Why Small Businesses Need Brand Voice
    Not just a logo, but an authentic voice

02. The Instagram Algorithm in 2025
    What actually works right now

03. Luxury Brands Get This Right
    Understanding premium positioning

04. Founding at 21
    What I learned when it shut down

05. Gen Z & Traditional Advertising
    Why it's not working anymore`,
                size: 2
            },
            {
                position: [0, 2, 50],
                title: 'GET IN TOUCH',
                content: `Let's collaborate on something amazing.

Email: ruhanibajaj1@gmail.com
Phone: (+44) 07352 685719
LinkedIn: ruhani-bajajrb

Currently seeking:
→ Brand Strategy roles
→ Marketing positions
→ Luxury brand opportunities
→ Consultancy roles

Open to full-time positions & projects.`,
                size: 2
            }
        ];

        artworkData.forEach((data, i) => {
            // Create glowing frame
            const frameGeometry = new THREE.BoxGeometry(data.size * 3, data.size * 3, 0.1);
            const frameMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                emissive: 0x333333,
                metalness: 0.6,
                roughness: 0.2
            });
            const frame = new THREE.Mesh(frameGeometry, frameMaterial);
            frame.position.set(...data.position);
            frame.castShadow = true;
            frame.receiveShadow = true;
            frame.userData = {
                type: 'artwork',
                interactive: true,
                index: i,
                title: data.title,
                content: data.content
            };
            scene.add(frame);
            artworks.push({ mesh: frame, data: data });

            // Create glowing border
            const borderGeometry = new THREE.EdgesGeometry(frameGeometry);
            const borderMaterial = new THREE.LineBasicMaterial({
                color: 0xffffff,
                linewidth: 2
            });
            const border = new THREE.LineSegments(borderGeometry, borderMaterial);
            border.position.set(...data.position);
            border.position.z -= 0.1;
            scene.add(border);
        });

        // ════════════════════════════════════════════════════════════
        // PLAYER MOVEMENT
        // ════════════════════════════════════════════════════════════
        const keys = {};
        const player = {
            velocity: new THREE.Vector3(),
            direction: new THREE.Vector3(),
            speed: 0.15,
            acceleration: 0.02,
            friction: 0.85
        };

        let yaw = 0, pitch = 0;
        let isLocked = false;

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener('mousemove', (e) => {
            if (isLocked) {
                yaw -= e.movementX * 0.003;
                pitch -= e.movementY * 0.003;
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            }
        });

        document.addEventListener('click', () => {
            renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
            if (renderer.domElement.requestPointerLock) {
                renderer.domElement.requestPointerLock();
                isLocked = true;
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
        });

        function updatePlayer() {
            let moveX = 0, moveZ = 0;

            if (keys['w']) moveZ -= player.acceleration;
            if (keys['s']) moveZ += player.acceleration;
            if (keys['a']) moveX -= player.acceleration;
            if (keys['d']) moveX += player.acceleration;

            const cos = Math.cos(yaw);
            const sin = Math.sin(yaw);

            player.velocity.x += moveX * cos - moveZ * sin;
            player.velocity.z += moveX * sin + moveZ * cos;

            player.velocity.x *= player.friction;
            player.velocity.z *= player.friction;

            camera.position.x += player.velocity.x;
            camera.position.z += player.velocity.z;

            // Collision with walls
            if (Math.abs(camera.position.x) > 95) camera.position.x = 95 * Math.sign(camera.position.x);
            if (Math.abs(camera.position.z) > 95) camera.position.z = 95 * Math.sign(camera.position.z);

            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        // ════════════════════════════════════════════════════════════
        // INTERACTION SYSTEM
        // ════════════════════════════════════════════════════════════
        const raycaster = new THREE.Raycaster();
        let nearestArtwork = null;

        function checkInteractions() {
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            raycaster.set(camera.position, forward);

            const intersects = raycaster.intersectObjects(artworks.map(a => a.mesh));

            if (intersects.length > 0 && intersects[0].distance < 20) {
                nearestArtwork = intersects[0].object;
            } else {
                nearestArtwork = null;
            }
        }

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === ' ') && nearestArtwork) {
                openArtwork(nearestArtwork.userData);
            }
        });

        function openArtwork(data) {
            const panel = document.getElementById('artwork-panel');
            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <h3>${data.title}</h3>
                <p>${data.content.split('\n').join('<br>')}</p>
            `;
            panel.classList.add('active');
        }

        function closePanel() {
            document.getElementById('artwork-panel').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePanel();
        });

        // ════════════════════════════════════════════════════════════
        // CURSOR
        // ════════════════════════════════════════════════════════════
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // ════════════════════════════════════════════════════════════
        // LOADING SCREEN
        // ════════════════════════════════════════════════════════════
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        });

        // ════════════════════════════════════════════════════════════
        // ANIMATION LOOP
        // ════════════════════════════════════════════════════════════
        function animate() {
            requestAnimationFrame(animate);

            updatePlayer();
            checkInteractions();

            // Animate artworks
            artworks.forEach((artwork, i) => {
                artwork.mesh.position.y = 2 + Math.sin(Date.now() * 0.0008 + i) * 0.3;
                artwork.mesh.rotation.y += 0.0003;

                // Glow effect
                if (artwork.mesh === nearestArtwork) {
                    artwork.mesh.material.emissive.setHex(0x444444);
                } else {
                    artwork.mesh.material.emissive.setHex(0x1a1a1a);
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
